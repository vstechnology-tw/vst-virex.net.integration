name: Publish NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, for example 2.0.2"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-packages:
    name: Publish Virex.NET packages
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write

    env:
      CONTRACTS_PACKAGE_ID: Virex.NET.Contracts
      CONTRACTS_PACKAGE_PROJECT: src/Virex.NET.Contracts/Virex.NET.Contracts.csproj
      CLIENT_PACKAGE_ID: Virex.NET.Client
      CLIENT_PACKAGE_PROJECT: src/Virex.NET.Client/Virex.NET.Client.csproj
      PACKAGE_OUTPUT: artifacts/packages
      NUGET_SOURCE: https://api.nuget.org/v3/index.json

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve package version
        id: package
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Package version could not be resolved. Use a release tag like v1.0.0 or provide workflow_dispatch input."
          }

          if ("${{ github.event_name }}" -eq "release" -and $version -match '^\d+\.\d+\.\d+\.\d+$') {
            Write-Host "Skipping NuGet publish for simulator-only four-part release version '$version'."
            "skip=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ($version -notmatch '^\d+\.\d+\.\d+([\-+][0-9A-Za-z\-.]+)?$') {
            throw "Package version '$version' is not a valid SemVer-style package version."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "skip=false" >> $env:GITHUB_OUTPUT

      - name: Validate NuGet user
        if: steps.package.outputs.skip != 'true'
        shell: pwsh
        env:
          NUGET_USER: ${{ vars.NUGET_USER }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_USER)) {
            throw "Repository variable NUGET_USER must be set to the nuget.org username or profile name used for trusted publishing."
          }

      - name: Restore
        if: steps.package.outputs.skip != 'true'
        run: dotnet restore Virex.NET.Integration.slnx

      - name: Test
        if: steps.package.outputs.skip != 'true'
        run: dotnet test Virex.NET.Integration.slnx --configuration Release --no-restore

      - name: Pack contracts
        if: steps.package.outputs.skip != 'true'
        run: >
          dotnet pack $env:CONTRACTS_PACKAGE_PROJECT
          --configuration Release
          --no-restore
          --output $env:PACKAGE_OUTPUT
          /p:PackageVersion=${{ steps.package.outputs.version }}

      - name: Pack client
        if: steps.package.outputs.skip != 'true'
        run: >
          dotnet pack $env:CLIENT_PACKAGE_PROJECT
          --configuration Release
          --no-restore
          --output $env:PACKAGE_OUTPUT
          /p:PackageVersion=${{ steps.package.outputs.version }}

      - name: NuGet login
        if: steps.package.outputs.skip != 'true'
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish packages
        if: steps.package.outputs.skip != 'true'
        shell: pwsh
        run: |
          $packageIds = @(
            $env:CONTRACTS_PACKAGE_ID,
            $env:CLIENT_PACKAGE_ID
          )

          foreach ($packageId in $packageIds) {
            $packagePath = Join-Path $env:PACKAGE_OUTPUT "$packageId.${{ steps.package.outputs.version }}.nupkg"
            dotnet nuget push $packagePath `
              --source $env:NUGET_SOURCE `
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" `
              --skip-duplicate
          }
