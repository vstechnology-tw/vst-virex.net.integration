site_name: Virex.NET Integration Kit
site_url: https://vstechnology-tw.github.io/vst-virex.net.integration/
use_directory_urls: false

theme:
  name: material
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search
  - i18n:
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
          site_name: Virex.NET Integration Kit
        - locale: zh
          name: 繁體中文
          build: true
          site_name: Virex.NET Integration Kit
          nav_translations:
            Home / Quick Start: 首頁 / 快速開始
            Simulator Manual: Simulator 操作手冊
            Transmitted Content / Payloads: 傳送內容 / Payloads
            Samples: 範例程式
            State Machine: 狀態機
            Protocol Reference: 通訊協定參考
            REST API: REST API
            TCP Socket: TCP Socket
            MQTT Events: MQTT Events
            Protocol Versioning: Protocol 版本規則
        - locale: ja
          name: 日本語
          build: true
          site_name: Virex.NET Integration Kit
          nav_translations:
            Home / Quick Start: ホーム / クイックスタート
            Simulator Manual: Simulator 操作マニュアル
            Transmitted Content / Payloads: 送受信内容 / Payloads
            Samples: サンプル
            State Machine: 状態遷移
            Protocol Reference: プロトコル参照
            REST API: REST API
            TCP Socket: TCP Socket
            MQTT Events: MQTT Events
            Protocol Versioning: Protocol Versioning
        - locale: ko
          name: 한국어
          build: true
          site_name: Virex.NET Integration Kit
          nav_translations:
            Home / Quick Start: 홈 / 빠른 시작
            Simulator Manual: Simulator 사용 설명서
            Transmitted Content / Payloads: 전송 내용 / Payloads
            Samples: 샘플
            State Machine: 상태 전이
            Protocol Reference: 프로토콜 참조
            REST API: REST API
            TCP Socket: TCP Socket
            MQTT Events: MQTT Events
            Protocol Versioning: Protocol Versioning

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home / Quick Start: index.md
  - Simulator Manual: simulator.md
  - Transmitted Content / Payloads: payloads.md
  - Samples: samples.md
  - State Machine: state-machine.md
  - Protocol Reference:
      - REST API: rest-api.md
      - TCP Socket: tcp-socket.md
      - MQTT Events: mqtt-events.md
      - Protocol Versioning: protocol-versioning.md
